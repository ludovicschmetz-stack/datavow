[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datavow"
version = "0.1.0"
description = "Data contract enforcement for modern data teams"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "typer[all]>=0.9",
    "pyyaml>=6",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-tmp-files",
]

[project.scripts]
datavow = "datavow.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/datavow"]
